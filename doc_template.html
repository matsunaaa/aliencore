# SYS.STYLOPHONE: BJT OSCILLATOR

> "Why use a 555-Timer when you can force raw silicon to scream?" — NULL_LOG

This document outlines the construction of a primitive Earth synthesizer using discrete components.

## HW_SPECIFICATIONS
* **Transistors:** 2x 2N3904 (NPN BJT)
* **Capacitors:** 2x 10uF Electrolytic
* **Resistors:** 1x 1kΩ, 1x 10kΩ, 1x Variable Potentiometer
* **Power:** 9V Earth Battery

## SCHEMATIC_ANALYSIS

The circuit relies on an **Astable Multivibrator** configuration. When power is applied, the slight mismatch in transistor characteristics causes one to turn on slightly faster than the other.

This creates a chain reaction:
1.  Transistor A pulls current, charging Capacitor A.
2.  Capacitor A discharges, shutting off Transistor B.
3.  The cycle repeats, generating a square wave.

        let isMusicPlaying = false;
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            if (isMusicPlaying) {
                music.pause();
                btn.innerText = '[►] SONIC: OFF';
            } else {
                music.play().then(() => {
                    btn.innerText = '[||] SONIC: ON';
                }).catch(e => console.log("SYS_ERR: AUDIO_BLOCKED"));
            }
            isMusicPlaying = !isMusicPlaying;
        }
